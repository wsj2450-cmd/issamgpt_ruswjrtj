<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>issamGPT 견적서 생성</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2937;
      --muted: #667085;
      --line: #d8dee8;
      --orange: #f05a1a;
      --orange-dark: #c7430f;
      --orange-soft: #fff1e8;
      --bg: #fff8f3;
      --white: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Malgun Gothic", "맑은 고딕", system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      background: #fff;
      border-bottom: 1px solid var(--line);
      padding: 22px 28px 18px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      letter-spacing: 0;
    }
    .brand {
      color: var(--orange);
      font-weight: 900;
      margin-right: 8px;
    }
    .tagline {
      margin: 8px 0 0;
      font-size: 15px;
      font-weight: 700;
    }
    main {
      max-width: 1480px;
      margin: 0 auto;
      padding: 26px;
    }
    .panel {
      background: var(--white);
      border: 1px solid #ffd9c4;
      border-radius: 10px;
      padding: 22px;
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
    }
    input, button { font: inherit; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      background: #fff;
    }
    button {
      border: 1px solid var(--orange);
      background: var(--orange);
      color: #fff;
      border-radius: 6px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }
    button.secondary {
      background: #fff;
      color: var(--orange-dark);
    }
    button:disabled {
      opacity: .55;
      cursor: wait;
    }
    .top-controls {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }
    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .table-scroll { overflow-x: auto; }
    table {
      width: 100%;
      min-width: 1040px;
      border-collapse: collapse;
      background: #fff;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 15px 12px;
      text-align: left;
      font-size: 13px;
      vertical-align: middle;
    }
    th {
      background: var(--orange-soft);
      font-weight: 800;
    }
    .num { width: 82px; }
    .small { width: 120px; }
    .amount { width: 170px; }
    .file-list { display: grid; gap: 10px; }
    .file-card {
      border: 1px solid #ffd1b8;
      background: #fffaf6;
      border-radius: 8px;
      padding: 14px;
    }
    .file-card strong {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      word-break: break-all;
    }
    .file-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      word-break: break-all;
    }
    .status {
      white-space: pre-wrap;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fffaf6;
      padding: 14px;
      min-height: 54px;
      line-height: 1.55;
    }
    .status.ok { border-color: #99d6c9; background: #f0fdfa; }
    .status.warn { border-color: #f3c679; background: #fffbeb; }
    .status.error { border-color: #f4a8a8; background: #fff1f2; }
    .notice {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      margin-top: 8px;
    }
    .quote-stage {
      position: fixed;
      left: -10000px;
      top: 0;
      width: 794px;
      background: #fff;
      color: #111827;
      padding: 48px;
      font-family: "Malgun Gothic", "맑은 고딕", sans-serif;
    }
    .quote-doc {
      border: 2px solid #111827;
      padding: 30px;
      min-height: 1040px;
    }
    .quote-doc h2 {
      margin: 0 0 30px;
      text-align: center;
      font-size: 30px;
      letter-spacing: 0;
    }
    .quote-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 30px;
      margin-bottom: 28px;
      font-size: 15px;
    }
    .quote-table {
      width: 100%;
      min-width: 0;
      border-collapse: collapse;
      margin-top: 18px;
    }
    .quote-table th, .quote-table td {
      border: 1px solid #111827;
      padding: 10px;
      font-size: 14px;
      text-align: center;
    }
    .quote-table th { background: #f3f4f6; }
    .quote-total {
      margin-top: 22px;
      text-align: right;
      font-size: 20px;
      font-weight: 800;
    }
    .quote-foot {
      margin-top: 70px;
      text-align: center;
      font-size: 18px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <header>
    <h1><span class="brand">issamGPT</span>견적서 생성</h1>
    <p class="tagline">견적서를 많이 뽑아 돈을 많이 벌어봐요</p>
  </header>
  <main>
    <section class="panel">
      <div class="top-controls">
        <div>
          <label for="quoteDate">견적일</label>
          <input id="quoteDate" type="date" />
        </div>
        <div class="toolbar">
          <button id="addRows">행 추가</button>
          <button id="clearRows" class="secondary">비우기</button>
          <button id="openAdmin" class="secondary">어드민 열기</button>
        </div>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th class="num">번호</th>
              <th>학교/단체명</th>
              <th>담당자</th>
              <th>이메일</th>
              <th class="small">계정수</th>
              <th class="small">기간</th>
              <th class="small">단가</th>
              <th class="amount">금액</th>
              <th>품명</th>
              <th class="small">삭제</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div class="toolbar">
        <button id="generate">견적서 묶음 생성</button>
        <button id="copyMail" class="secondary">메일 목록 복사</button>
      </div>
      <p class="notice">공용 홈페이지 버전입니다. 파일은 서버에 저장되지 않고 현재 브라우저에서 바로 생성됩니다.</p>
    </section>

    <section class="panel">
      <label>생성된 파일</label>
      <div id="files" class="file-list">
        <div class="file-card">
          <strong>아직 생성된 파일이 없습니다.</strong>
          <span>견적서를 만들면 ZIP 묶음이 여기에 표시됩니다.</span>
        </div>
      </div>
    </section>

    <section class="panel">
      <label>상태</label>
      <div id="status" class="status">준비 중...</div>
    </section>
  </main>
  <div id="quoteStage" class="quote-stage"></div>

  <script>
    const state = { rows: [] };
    const $ = (id) => document.getElementById(id);

    function today() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function setStatus(text, cls = "") {
      $("status").className = `status ${cls}`;
      $("status").textContent = text;
    }
    function addBlankRow(seed = {}) {
      state.rows.push({
        number: seed.number || nextNumberFromRows(),
        school: seed.school || "",
        contact: seed.contact || "",
        email: seed.email || "",
        accounts: seed.accounts || 6,
        months: seed.months || 6,
        unitPrice: seed.unitPrice || 17000,
        product: seed.product || "issamGPT 학교 PRO 구독권",
      });
      renderRows();
    }
    function nextNumberFromRows() {
      const max = state.rows.reduce((m, r) => Math.max(m, Number(r.number) || 0), 0);
      return max + 1;
    }
    function calculatedAmount(accounts, months, unitPrice) {
      return (Number(accounts) || 0) * (Number(months) || 0) * (Number(unitPrice) || 0);
    }
    function updateRow(i, key, value) {
      state.rows[i][key] = value;
      renderRows();
    }
    function removeRow(i) {
      state.rows.splice(i, 1);
      renderRows();
    }
    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (ch) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[ch]));
    }
    function safeName(value) {
      return String(value || "미입력").trim().replace(/[<>:"/\\|?*\x00-\x1f]/g, "_").replace(/\s+/g, "_");
    }
    function won(value) {
      return `${Number(value || 0).toLocaleString("ko-KR")}원`;
    }
    function quoteDateText() {
      const raw = $("quoteDate").value || today();
      const [y, m, d] = raw.split("-");
      return `${Number(y)}년 ${Number(m)}월 ${Number(d)}일`;
    }
    function renderRows() {
      $("rows").innerHTML = state.rows.map((row, i) => `
        <tr>
          <td><input value="${escapeHtml(row.number)}" onchange="updateRow(${i}, 'number', this.value)" /></td>
          <td><input value="${escapeHtml(row.school)}" onchange="updateRow(${i}, 'school', this.value)" /></td>
          <td><input value="${escapeHtml(row.contact)}" onchange="updateRow(${i}, 'contact', this.value)" /></td>
          <td><input value="${escapeHtml(row.email)}" onchange="updateRow(${i}, 'email', this.value)" /></td>
          <td><input value="${escapeHtml(row.accounts)}" onchange="updateRow(${i}, 'accounts', this.value)" /></td>
          <td><input value="${escapeHtml(row.months)}" onchange="updateRow(${i}, 'months', this.value)" /></td>
          <td><input value="${escapeHtml(row.unitPrice)}" onchange="updateRow(${i}, 'unitPrice', this.value)" /></td>
          <td><input value="${escapeHtml(calculatedAmount(row.accounts, row.months, row.unitPrice).toLocaleString('ko-KR'))}" readonly /></td>
          <td><input value="${escapeHtml(row.product)}" onchange="updateRow(${i}, 'product', this.value)" /></td>
          <td><button class="secondary" onclick="removeRow(${i})">삭제</button></td>
        </tr>
      `).join("");
    }
    function cleanRows() {
      return state.rows
        .filter((r) => r.school && Number(r.accounts) >= 6)
        .map((r) => ({
          ...r,
          number: Number(r.number),
          accounts: Number(r.accounts),
          months: Number(r.months),
          unitPrice: Number(r.unitPrice || 17000),
          amount: calculatedAmount(r.accounts, r.months, r.unitPrice),
        }));
    }
    function mailText(rows) {
      return rows.map((row) => [
        `받는 사람: ${row.email || ""}`,
        `제목: [issamGPT] ${row.school} 견적서 송부드립니다`,
        `첨부: ${row.number}_견적서_${safeName(row.school)}_${safeName(row.contact)}.pdf`,
      ].join("\n")).join("\n\n");
    }
    function quoteHtml(row) {
      const supply = Math.round(row.amount / 1.1);
      const vat = row.amount - supply;
      return `
        <div class="quote-doc">
          <h2>견 적 서</h2>
          <div class="quote-meta">
            <div><strong>견적일</strong> ${escapeHtml(quoteDateText())}</div>
            <div><strong>견적번호</strong> ${escapeHtml(row.number)}</div>
            <div><strong>수신</strong> ${escapeHtml(row.school)}</div>
            <div><strong>참고</strong> ${escapeHtml(row.contact)}</div>
          </div>
          <p>아래와 같이 issamGPT 이용 견적을 제출합니다.</p>
          <table class="quote-table">
            <thead>
              <tr>
                <th>품명</th>
                <th>계정수</th>
                <th>기간</th>
                <th>단가</th>
                <th>공급가액</th>
                <th>부가세</th>
                <th>합계</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>${escapeHtml(row.product)}</td>
                <td>${row.accounts}명</td>
                <td>${row.months}개월</td>
                <td>${won(row.unitPrice)}</td>
                <td>${won(supply)}</td>
                <td>${won(vat)}</td>
                <td>${won(row.amount)}</td>
              </tr>
            </tbody>
          </table>
          <div class="quote-total">총 견적금액: ${won(row.amount)}</div>
          <div class="quote-foot">
            <strong>주식회사 아이스크림미디어</strong><br />
            issamGPT 고객지원
          </div>
        </div>`;
    }
    async function pdfBlob(row) {
      const stage = $("quoteStage");
      stage.innerHTML = quoteHtml(row);
      await new Promise((resolve) => requestAnimationFrame(resolve));
      const canvas = await html2canvas(stage.firstElementChild, { scale: 2, backgroundColor: "#ffffff" });
      const imgData = canvas.toDataURL("image/png");
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF("p", "mm", "a4");
      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      const ratio = Math.min(pageWidth / canvas.width, pageHeight / canvas.height);
      const width = canvas.width * ratio;
      const height = canvas.height * ratio;
      pdf.addImage(imgData, "PNG", (pageWidth - width) / 2, 0, width, height);
      stage.innerHTML = "";
      return pdf.output("blob");
    }
    function xlsxBlob(row) {
      const supply = Math.round(row.amount / 1.1);
      const vat = row.amount - supply;
      const data = [
        ["견 적 서"],
        [],
        ["견적일", quoteDateText(), "견적번호", row.number],
        ["수신", row.school, "참고", row.contact],
        [],
        ["품명", "계정수", "기간", "단가", "공급가액", "부가세", "합계"],
        [row.product, row.accounts, row.months, row.unitPrice, supply, vat, row.amount],
        [],
        ["총 견적금액", row.amount],
        [],
        ["주식회사 아이스크림미디어"],
      ];
      const ws = XLSX.utils.aoa_to_sheet(data);
      ws["!cols"] = [{ wch: 28 }, { wch: 12 }, { wch: 12 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 }];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "견적서");
      const out = XLSX.write(wb, { bookType: "xlsx", type: "array" });
      return new Blob([out], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
    }
    async function generate() {
      const rows = cleanRows();
      if (!rows.length) {
        setStatus("생성할 6명 이상 행이 없습니다.", "warn");
        return;
      }
      $("generate").disabled = true;
      setStatus("브라우저에서 견적서 묶음을 생성 중입니다...");
      try {
        const zip = new JSZip();
        for (const row of rows) {
          const base = `${row.number}_견적서_${safeName(row.school)}_${safeName(row.contact)}`;
          zip.file(`${base}.pdf`, await pdfBlob(row));
          zip.file(`${base}.xlsx`, xlsxBlob(row));
        }
        const mail = mailText(rows);
        zip.file("메일목록.txt", mail);
        const blob = await zip.generateAsync({ type: "blob" });
        const first = safeName(rows[0].school);
        const name = `${today().replaceAll("-", "")}_${first}_견적서_묶음.zip`;
        const url = URL.createObjectURL(blob);
        renderFiles([{ name, url, type: "ZIP 묶음" }]);
        await navigator.clipboard.writeText(mail).catch(() => {});
        setStatus(`완료했습니다.\n\n${rows.length}건 생성 완료\n메일 목록은 클립보드에 복사했습니다.\n\n${mail}`, "ok");
      } catch (err) {
        setStatus(`오류: ${err.message}`, "error");
      } finally {
        $("generate").disabled = false;
      }
    }
    async function copyMail() {
      const rows = cleanRows();
      if (!rows.length) {
        setStatus("복사할 6명 이상 행이 없습니다.", "warn");
        return;
      }
      const text = mailText(rows);
      await navigator.clipboard.writeText(text).catch(() => {});
      setStatus(`메일 목록을 복사했습니다.\n\n${text}`, "ok");
    }
    function renderFiles(files) {
      $("files").innerHTML = files.length ? files.map((file) => `
        <div class="file-card">
          <strong>${escapeHtml(file.name)}</strong>
          <span>${escapeHtml(file.type)} · 이 브라우저에서 바로 다운로드할 수 있습니다.</span>
          <div class="toolbar">
            <a href="${file.url}" download="${escapeHtml(file.name)}"><button class="secondary">다운로드</button></a>
          </div>
        </div>
      `).join("") : `
        <div class="file-card">
          <strong>아직 생성된 파일이 없습니다.</strong>
          <span>견적서를 만들면 ZIP 묶음이 여기에 표시됩니다.</span>
        </div>
      `;
    }
    $("addRows").onclick = () => addBlankRow();
    $("clearRows").onclick = () => { state.rows = []; addBlankRow(); setStatus("입력 행을 비웠습니다."); };
    $("generate").onclick = generate;
    $("copyMail").onclick = copyMail;
    $("openAdmin").onclick = () => window.open("https://admin.issamgpt.com/operations", "_blank");
    $("quoteDate").value = today();
    addBlankRow();
    setStatus("공용 홈페이지 준비 완료. 로그인 없이 누구나 브라우저에서 견적서 묶음을 생성할 수 있습니다.", "ok");
  </script>
</body>
</html>
